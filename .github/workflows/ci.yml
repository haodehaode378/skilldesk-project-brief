name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Verify
    runs-on: windows-latest

    defaults:
      run:
        working-directory: skilldesk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          package_json_file: skilldesk/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: skilldesk/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: skilldesk/src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test frontend
        run: pnpm test

      - name: Test scanner
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Check scanner
        run: cargo check --manifest-path src-tauri/Cargo.toml
